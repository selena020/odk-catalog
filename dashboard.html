{% extends "base.html" %}
{% block content %}
<h2><i class="fas fa-shield-alt"></i> Админ-панель</h2>

<a href="{{ url_for('admin.add_product') }}" class="btn" style="margin-bottom: 20px; display: inline-block;">
    <i class="fas fa-plus"></i> Добавить двигатель
</a>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Категория</th>
            <th>Характеристики</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for p in products %}
        <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.name }}</td>
            <td>{{ p.category.name if p.category else '—' }}</td>
            <td>{{ p.get_spec() }}</td>
            <td>
                <a href="{{ url_for('admin.edit_product', id=p.id) }}" class="btn-small">✏️ Редактировать</a>
                <a href="{{ url_for('admin.delete_product', id=p.id) }}" class="btn-small btn-danger" onclick="return confirm('Удалить {{ p.name }}?')">🗑️ Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<style>
.btn-small {
    display: inline-block;
    padding: 4px 10px;
    margin: 0 2px;
    background: #1e6f9f;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 0.75rem;
}
.btn-danger {
    background: #dc3545;
}
.btn-danger:hover {
    background: #b02a37;
}
</style>
{% endblock %}

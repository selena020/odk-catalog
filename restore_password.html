{% extends "base.html" %}
{% block content %}
<h2>Сброс пароля</h2>
<form method="post">
    <input type="password" name="password" placeholder="Новый пароль" required>
    <input type="password" name="confirm" placeholder="Подтвердите пароль" required>
    <button type="submit">Сменить пароль</button>
</form>
{% endblock %}
